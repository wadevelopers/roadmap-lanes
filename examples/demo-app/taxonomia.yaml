# Taxonomía de DemoApp — áreas (nivel 1) y zonas (nivel 2).
# Cerrada: una tarea solo usa valores que existen acá.
# Extensible: para una categoría nueva, se edita este archivo (no se inventa desde la tarea).

areas:
  backend:
    descripcion: Lógica de servidor y modelos de dominio
    zonas: [CheckoutService, ProductModel, ApiLayer, SearchService]
  frontend:
    descripcion: Interfaz de usuario
    zonas: [CartUI, CheckoutUI, SearchUI]
  pagos:
    descripcion: Integración con la pasarela de pago
    zonas: [PaymentGateway]
  datos:
    descripcion: Esquema de base de datos y migraciones
    zonas: [ProductSchema, Migrations]
  infra:
    descripcion: Tooling, build e integración continua
    zonas: [CI, Build]
