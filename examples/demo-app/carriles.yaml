# Carriles de DemoApp.
# La cola define el orden de ejecución; las dependencias solo marcan "fuera de turno".
# Toda tarea que NO esté en ninguna cola = backlog.

carriles:
  A:
    foco: Checkout y pagos
    worktree: main-app
    cola: [FT-001, FT-002, ETAPA-B]
  B:
    foco: Mejoras independientes
    worktree: wt-side
    cola: [DT-011, INFRA-003, DT-020]
  C:
    foco: Registro y limpieza
    worktree: wt-registro
    cola: [DT-030, FT-003, INFRA-005]
